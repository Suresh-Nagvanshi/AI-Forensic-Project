<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title>Scan Image</title>
</head>
<body>
<section layout:fragment="content" class="scan-upload-section">
    <div class="container">
        <h1>Upload Image for Forensic Analysis</h1>
        <p>Select an image and run the AI forensic scan.</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/scan/predict}" method="post" enctype="multipart/form-data">
            <div>
                <label for="file">Choose image</label>
                <input id="file" type="file" name="file" accept=".png,.jpg,.jpeg,image/png,image/jpeg" required>
            </div>

            <div style="margin-top: 16px;">
                <button type="submit">Analyze Image</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
