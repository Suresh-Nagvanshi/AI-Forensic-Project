<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="headerPublic" class="site-header">
    <div class="container header-inner">
        <a class="brand" th:href="@{/}" aria-label="AI Forensic home">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 32 32" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="11" stroke="currentColor" stroke-width="2"/>
                    <path d="M10 18.5C12 14 20 14 22 18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M13 12h.01M19 12h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </span>

            <span class="brand-copy">
                <span class="brand-text">AI Forensic</span>
                <span class="brand-subtext">Deepfake & image screening</span>
            </span>
        </a>

        <div class="header-actions">
            <nav class="site-nav" aria-label="Primary">
                <a th:href="@{/}" class="nav-link">Home</a>
                <a th:href="@{/about}" class="nav-link">About</a>
                <a th:href="@{/contact}" class="nav-link">Contact</a>
                <a th:href="@{/feedback}" class="nav-link">Feedback</a>
                <a th:href="@{/login}" class="nav-cta">Sign in</a>
            </nav>

            <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme">
                <span class="theme-toggle-icon" aria-hidden="true">◐</span>
            </button>
        </div>
    </div>
</header>
</body>
</html>
