<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header" class="site-header">
    <div class="container header-inner">
        <a class="brand" th:href="@{/}" aria-label="AI Forensic home">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 32 32" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="11" stroke="url(#logo-grad)" stroke-width="2"/>
                    <path d="M10 18.5C12 14 20 14 22 18.5" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
                    <path d="M13 12h.01M19 12h.01" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4fd1c5" />
                            <stop offset="1" stop-color="#3b82f6" />
                        </linearGradient>
                    </defs>
                </svg>
            </span>
            <span class="brand-copy">
                <span class="brand-text">AI Forensic</span>
                <span class="brand-subtext" style="color: #4fd1c5; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700;">PRO</span>
            </span>
        </a>

        <div class="header-actions">
            <nav class="site-nav" aria-label="Primary navigation">
                <a th:href="@{/}" class="nav-link">Home</a>
                <a th:href="@{/about}" class="nav-link">About</a>
                <a th:href="@{/contact}" class="nav-link">Contact</a>
                <a th:href="@{/feedback}" class="nav-link">Feedback</a>

                <a th:href="@{/scan}"
                   class="nav-cta nav-cta-primary"
                   sec:authorize="isAuthenticated()">Start Scan</a>

                <a th:href="@{/login}"
                   class="nav-link"
                   sec:authorize="isAnonymous()">Log in</a>

                <a th:href="@{/signup}"
                   class="nav-cta"
                   sec:authorize="isAnonymous()">Sign up</a>

                <div class="user-profile-badge" sec:authorize="isAuthenticated()">
                    <span class="nav-user-icon">👤</span>
                    <span class="nav-user" sec:authentication="name"></span>
                </div>

                <form th:action="@{/logout}" method="post"
                      sec:authorize="isAuthenticated()" class="logout-form" style="margin-left: 8px;">
                    <button type="submit" class="nav-link-button">Logout</button>
                </form>
            </nav>
        </div>
    </div>
</header>
</body>
</html>
